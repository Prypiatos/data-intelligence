name: Airflow CI/CD - Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'dags/**'
      - 'src/**'
      - 'docker/Dockerfile.airflow'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data-intelligence code
        # Pull the repository contents onto the runner so we can build from it
        uses: actions/checkout@v4

      - name: Checkout platform-infra code
        # Checkout the platform-infra repo to update k8s files
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/platform-infra
          path: platform-infra
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # Install Buildx, the extended Docker build client that supports advanced features like caching
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        # Authenticate with Docker Hub using credentials stored in GitHub secrets
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        # Build the Airflow image from its Dockerfile and tag it with both 'latest' and the commit SHA
        run: |
          docker build \
            --build-arg VERSION=${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/e2-airflow:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/e2-airflow:${{ github.sha }} \
            -f docker/Dockerfile.airflow \
            .

      - name: Push Docker image
        # Upload both tags to Docker Hub so the latest and the exact commit version are available
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/e2-airflow:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/e2-airflow:${{ github.sha }}

      - name: Update Kubernetes deployment
        # Update the container image reference in the k8s manifest with the new commit SHA
        run: |
          sed -i "s|.*/e2-airflow:.*|${{ secrets.DOCKER_USERNAME }}/e2-airflow:${{ github.sha }}|g" platform-infra/k8s/data-intelligence/airflow.yaml

      - name: Commit and push k8s changes
        # Commit the updated k8s manifest and push it to the repository
        run: |
          cd platform-infra
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add k8s/data-intelligence/airflow.yaml
          git commit -m "Update Airflow container image to ${{ github.sha }}" || echo "No changes to commit"
          git push
