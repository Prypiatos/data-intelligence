services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: energy-zookeeper
    env_file:
      - .env
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - energy_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: energy-kafka
    depends_on:
      - zookeeper
    env_file:
      - .env
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - energy_network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        echo "Creating kafka topics..."
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic energy.telemetry --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic energy.telemetry.results --partitions 1 --replication-factor 1
    networks:
      - energy_network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: energy-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped
    networks:
      - energy_network

  postgres:
    image: postgres:16
    container_name: energy-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-energy_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - energy_network

  influxdb:
    image: influxdb:2.7
    container_name: energy-influxdb
    env_file:
      - .env
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - energy_network

  redis:
    image: redis:7
    container_name: energy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - energy_network

  flink-jobmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: flink-jobmanager
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    ports:
      - "8082:8081"
    volumes:
      - flink_data:/flink_data
    restart: unless-stopped
    networks:
      - energy_network

  flink-taskmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - flink_data:/flink_data
    restart: unless-stopped
    networks:
      - energy_network

  streaming:
    build:
      context: .
      dockerfile: docker/Dockerfile.streaming
    container_name: streaming
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - .:/app
    networks:
      - energy_network

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: energy-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-energy_user}:${POSTGRES_PASSWORD:-energy_pass}@postgres:5432/${POSTGRES_DB:-energy_db}
      --default-artifact-root /mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    restart: unless-stopped
    networks:
      - energy_network

  airflow:
    image: python:3.11-slim
    container_name: energy-airflow
    command: ["sh", "-c", "while true; do echo airflow running; sleep 10; done"]
    env_file:
      - .env
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - energy_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: energy-api
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - energy_network

  ingestion:
    image: python:3.11-slim
    container_name: energy-ingestion
    command: ["sh", "-c", "while true; do echo ingestion running; sleep 10; done"]
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - energy_network

  anomaly:
    image: python:3.11-slim
    container_name: energy-anomaly
    command: ["sh", "-c", "while true; do echo anomaly running; sleep 10; done"]
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - energy_network

  forecasting:
    image: python:3.11-slim
    container_name: energy-forecasting
    command: ["sh", "-c", "while true; do echo forecasting running; sleep 10; done"]
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - energy_network

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  flink_data:
  mlflow_artifacts:
  mosquitto_data:
  mosquitto_logs:

networks:
  energy_network:
    driver: bridge
