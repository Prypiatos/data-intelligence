version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    env_file:
      - .env
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped
    networks:
      - energy_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    env_file:
      - .env
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://10.10.17.96:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    restart: unless-stopped
    networks:
      - energy_network

  postgres:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - energy_network

  influxdb:
    image: influxdb:2.7
    env_file:
      - .env
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    restart: unless-stopped
    networks:
      - energy_network

  redis:
    image: redis:7
    env_file:
      - .env
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - energy_network

  mlflow:
    image: ghcr.io/mlflow/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    env_file:
      - .env
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - energy_network

  airflow:
    image: python:3.11-slim
    command: ["sh", "-c", "while true; do echo airflow running; sleep 10; done"]
    env_file:
      - .env
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - energy_network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - postgres
      - influxdb
      - redis
      - mlflow
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - energy_network

  ingestion:
    image: python:3.11-slim
    command: ["sh", "-c", "while true; do echo ingestion running; sleep 10; done"]
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - energy_network

  streaming:
    image: python:3.11-slim
    command: ["sh", "-c", "while true; do echo streaming running; sleep 10; done"]
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - energy_network

  anomaly:
    image: python:3.11-slim
    command: ["sh", "-c", "while true; do echo anomaly running; sleep 10; done"]
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - energy_network

  forecasting:
    image: python:3.11-slim
    command: ["sh", "-c", "while true; do echo forecasting running; sleep 10; done"]
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - energy_network

volumes:
  postgres_data:
  influxdb_data:

networks:
  energy_network:
    driver: bridge