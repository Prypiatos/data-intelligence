version: '3.8'

services:
  # ============================================
  # DATABASES
  # ============================================
  
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_DB: energy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy_network

  influxdb:
    image: influxdb:latest
    container_name: influxdb
    environment:
      INFLUXDB_DB: energy
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: adminpassword
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy_network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy_network

  # ============================================
  # MESSAGING (Kafka)
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - energy_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy_network

  # ============================================
  # SPARK (Batch Processing)
  # ============================================

  spark-master:
    image: bitnami/spark:3.4.0
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - spark_data:/bitnami/spark
    networks:
      - energy_network

  spark-worker:
    image: bitnami/spark:3.4.0
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    ports:
      - "8081:8081"
    volumes:
      - spark_data:/bitnami/spark
    networks:
      - energy_network

  # ============================================
  # FLINK (Stream Processing)
  # ============================================

  flink-jobmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: flink-jobmanager
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    ports:
      - "6123:6123"
      - "8081:8081"
    volumes:
      - flink_data:/flink_data
    networks:
      - energy_network

  flink-taskmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    ports:
      - "6124:6124"
    volumes:
      - flink_data:/flink_data
    networks:
      - energy_network

  # ============================================
  # MLflow (Experiment Tracking)
  # ============================================

  mlflow:
    image: python:3.9
    container_name: mlflow
    working_dir: /mlflow
    command: pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://postgres:postgres@postgres:5432/mlflow --default-artifact-root /mlflow/artifacts
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - energy_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MQTT Broker (Connection to E1)
  # ============================================

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - energy_network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$SYS/broker/clients/connected"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Airflow (Orchestration)
  # ============================================

  airflow-webserver:
    image: apache/airflow:2.6.2
    container_name: airflow-webserver
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    ports:
      - "8888:8080"
    volumes:
      - ./dags:/app/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - postgres
    command: /bin/bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && airflow webserver"
    networks:
      - energy_network

  # ============================================
  # Application Container (For Running Code)
  # ============================================

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: energy-app
    depends_on:
      - postgres
      - influxdb
      - kafka
      - spark-master
      - mlflow
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: energy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_ORG: energy_org
      INFLUXDB_BUCKET: energy
      KAFKA_BROKER: kafka:9092
      MQTT_BROKER: mosquitto
      SPARK_MASTER: spark://spark-master:7077
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
    working_dir: /app
    command: /bin/bash
    stdin_open: true
    tty: true
    networks:
      - energy_network

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  spark_data:
  flink_data:
  mlflow_artifacts:
  mosquitto_data:
  mosquitto_logs:
  airflow_logs:

networks:
  energy_network:
    driver: bridge