version: '3.8'

services:
  # ============================================
  # DATABASES
  # ============================================

  postgres:
    image: postgres:16
    container_name: energy-postgres
    environment:
      POSTGRES_DB: energy_db
      POSTGRES_USER: energy_user
      POSTGRES_PASSWORD: energy_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy_network

  influxdb:
    image: influxdb:2.7
    container_name: energy-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: energy-org
      DOCKER_INFLUXDB_INIT_BUCKET: energy_telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: energy-token-123
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy_network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy_network

  # ============================================
  # MESSAGING
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: energy-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - energy_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: energy-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy_network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: energy-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - energy_network

  # ============================================
  # SPARK (Batch Processing)
  # ============================================

  spark-master:
    image: bitnami/spark:3.4.0
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - spark_data:/bitnami/spark
    networks:
      - energy_network

  spark-worker:
    image: bitnami/spark:3.4.0
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    ports:
      - "8081:8081"
    volumes:
      - spark_data:/bitnami/spark
    networks:
      - energy_network

  # ============================================
  # FLINK (Stream Processing)
  # ============================================

  flink-jobmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: flink-jobmanager
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    ports:
      - "6123:6123"
    volumes:
      - flink_data:/flink_data
    networks:
      - energy_network

  flink-taskmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    ports:
      - "6124:6124"
    volumes:
      - flink_data:/flink_data
    networks:
      - energy_network

  # ============================================
  # MLflow (Experiment Tracking)
  # ============================================

  mlflow:
    image: python:3.9
    container_name: mlflow
    working_dir: /mlflow
    command: pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://energy_user:energy_pass@postgres:5432/energy_db --default-artifact-root /mlflow/artifacts
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - energy_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API
  # ============================================

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: energy-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - energy_network

  # ============================================
  # Airflow (Orchestration)
  # ============================================

  airflow-webserver:
    image: apache/airflow:2.6.2
    container_name: airflow-webserver
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://energy_user:energy_pass@postgres:5432/energy_db
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    ports:
      - "8888:8080"
    volumes:
      - ./dags:/app/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - postgres
    command: /bin/bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && airflow webserver"
    networks:
      - energy_network

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  spark_data:
  flink_data:
  mlflow_artifacts:
  mosquitto_data:
  mosquitto_logs:
  airflow_logs:

networks:
  energy_network:
    driver: bridge
